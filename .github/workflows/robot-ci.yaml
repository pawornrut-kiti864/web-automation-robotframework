name: Robot Framework Web Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # 09:00 Thailand (UTC+7)

jobs:

  # =========================
  # 🧱 STAGE 1: SETUP
  # =========================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + Chrome
        run: |
          pip install -U pip robotframework robotframework-seleniumlibrary

          sudo apt-get update
          sudo apt-get install -y \
            wget libnss3 libgbm1 libasound2t64 \
            libatk-bridge2.0-0 libgtk-3-0

          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

  # =========================
  # 🧪 STAGE 2: TEST
  # =========================
  test:
    name: Run Web Tests
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + Chrome
        run: |
          pip install -U pip robotframework robotframework-seleniumlibrary

          sudo apt-get update
          sudo apt-get install -y \
            wget libnss3 libgbm1 libasound2t64 \
            libatk-bridge2.0-0 libgtk-3-0

          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      - name: Run tests
        run: |
          python3 -m robot --outputdir results tests/

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: results/

  # =========================
  # 📊 STAGE 3: REPORT
  # =========================
  report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: robot-report

      - name: Summary
        run: |
          echo "✅ Web Automation Test Completed" >> $GITHUB_STEP_SUMMARY
          echo "📊 Check artifact for report.html" >> $GITHUB_STEP_SUMMARY