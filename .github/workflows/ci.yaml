name: QA Web Automation Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]
  schedule:
    - cron: "45 16 * * *"
  workflow_dispatch:
    inputs:
      test_type:
        description: "Choose test type"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression

jobs:

  smoke-tests:
    if: github.event_name != 'schedule' || github.event.inputs.test_type == 'smoke'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install robotframework
        pip install robotframework-seleniumlibrary
        pip install robotframework-pabot

    - name: Install Chrome
      run: |
        sudo apt-get update
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb
        google-chrome --version

    - name: Install Linux dependencies
      run: |
        sudo apt-get install -y \
          libnss3 libgbm1 libasound2t64 \
          libatk-bridge2.0-0 libgtk-3-0

    - name: Fix Chrome shared memory
      run: |
        sudo mount -o remount,size=2G /dev/shm

    - name: Run Smoke Tests
      run: |
        pabot --processes 2 \
          --outputdir results \
          --variable BROWSER:chrome \
          --variable OPTIONS:"add_argument(--headless=new);add_argument(--no-sandbox);add_argument(--disable-dev-shm-usage);add_argument(--disable-gpu)" \
          tests/

    - name: Upload Smoke Report
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report
        path: results/


  regression-tests:
    if: github.event_name == 'schedule' || github.event.inputs.test_type == 'regression'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install robotframework
        pip install robotframework-seleniumlibrary
        pip install robotframework-pabot

    - name: Install Chrome
      run: |
        sudo apt-get update
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb

    - name: Install Linux dependencies
      run: |
        sudo apt-get install -y \
          libnss3 libgbm1 libasound2t64 \
          libatk-bridge2.0-0 libgtk-3-0

    - name: Fix Chrome shared memory
      run: |
        sudo mount -o remount,size=2G /dev/shm

    - name: Run Regression Tests (Parallel)
      run: |
        pabot --processes 3 \
          --outputdir results \
          --variable BROWSER:chrome \
          --variable OPTIONS:"add_argument(--headless=new);add_argument(--no-sandbox);add_argument(--disable-dev-shm-usage);add_argument(--disable-gpu)" \
          tests/

    - name: Upload Regression Report
      uses: actions/upload-artifact@v4
      with:
        name: regression-report
        path: results/
